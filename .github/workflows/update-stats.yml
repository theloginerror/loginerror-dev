name: Update Forum Stats

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch: # Allows manual trigger

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Forum Data
        run: |
          mkdir -p data

          # Function to fetch with retry-after support
          fetch_with_retry() {
            local url="$1"
            local output="$2"
            local max_attempts=3
            local attempt=1
            local max_rate_limit_retries=10

            while [ $attempt -le $max_attempts ]; do
              echo "Attempt $attempt: Fetching $url"

              # Fetch with headers to get status code and Retry-After
              # Use a temp file to separate body from metadata
              temp_body=$(mktemp)
              temp_headers=$(mktemp)

              http_code=$(curl -s -w "%{http_code}" -o "$temp_body" -D "$temp_headers" "$url")

              if [ "$http_code" -eq 200 ]; then
                cat "$temp_body" > "$output"
                rm -f "$temp_body" "$temp_headers"
                echo "Success: Data saved to $output"
                return 0
              elif [ "$http_code" -eq 429 ]; then
                # Extract Retry-After header (case-insensitive)
                retry_after=$(grep -i "^retry-after:" "$temp_headers" | cut -d' ' -f2 | tr -d '\r\n' || echo "")

                rm -f "$temp_body" "$temp_headers"

                if [ -n "$retry_after" ] && [ $attempt -le $max_rate_limit_retries ]; then
                  echo "Rate limited (429). Retry-After: ${retry_after}s (retry without incrementing attempt counter)"
                  sleep "$retry_after"
                  # Don't increment attempt counter for rate limits with Retry-After header
                  continue
                else
                  # Default exponential backoff if no Retry-After header
                  wait_time=$((attempt * 30))
                  echo "Rate limited (429). No Retry-After header or max rate limit retries exceeded. Waiting ${wait_time}s"
                  sleep "$wait_time"
                fi
              else
                echo "Error: HTTP $http_code"
                rm -f "$temp_body" "$temp_headers"
                if [ $attempt -lt $max_attempts ]; then
                  sleep 10
                fi
              fi

              attempt=$((attempt + 1))
            done

            echo "Failed after $max_attempts attempts"
            return 1
          }

          fetch_with_retry "https://forum.uipath.com/u/loginerror.json" "data/loginerror.json"
          sleep 2  # Brief pause between requests
          fetch_with_retry "https://forum.uipath.com/u/loginerror/summary.json" "data/summary.json"

      - name: Process Stats
        id: process
        run: |
          # Validate JSON files before processing
          echo "Validating JSON files..."
          if ! jq empty data/loginerror.json 2>/dev/null; then
            echo "Error: data/loginerror.json is not valid JSON"
            cat data/loginerror.json
            exit 1
          fi
          if ! jq empty data/summary.json 2>/dev/null; then
            echo "Error: data/summary.json is not valid JSON"
            cat data/summary.json
            exit 1
          fi

          # Use node to process the JSON and create a clean stats.json
          node -e '
            const fs = require("fs");
            const summary = JSON.parse(fs.readFileSync("data/summary.json")).user_summary;
            const user = JSON.parse(fs.readFileSync("data/loginerror.json")).user;

            const formatK = (num) => (num >= 1000 ? (num / 1000).toFixed(1) + "k" : num);
            const formatDays = (seconds) => Math.floor(seconds / 86400) + " days";

            const stats = [
              { label: "[VITAL]", val: `READ_TIME: ${formatDays(summary.time_read)}` },
              { label: "[VITAL]", val: `VISITED: ${summary.days_visited.toLocaleString()} days` },
              { label: "[DATA]",  val: `TOPICS_VIEWED: ${formatK(summary.topics_entered)}` },
              { label: "[DATA]",  val: `POSTS_READ: ${formatK(summary.posts_read_count)}` },
              { label: "[ACT]",   val: `SOLUTIONS: ${summary.solved_count}` },
              { label: "[ACT]",   val: `POSTS_CREATED: ${formatK(summary.post_count)}` },
              { label: "[INT]",   val: `LIKES_GIVEN: ${formatK(summary.likes_given)}` },
              { label: "[INT]",   val: `LIKES_RCVD: ${formatK(summary.likes_received)}` },
              { label: "[LOG]",   val: `TOPICS_CREATED: ${summary.topic_count}` }
            ];

            fs.writeFileSync("data/stats.json", JSON.stringify(stats, null, 2));
          '

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stats.json
          git commit -m "chore: update forum stats [skip ci]" || echo "No changes to commit"
          git push
